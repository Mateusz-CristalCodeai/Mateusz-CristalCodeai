name: Refresh Profile Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/profile-stats.yml"
      - "scripts/generate_readme_stats.py"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG cards
        env:
          PROFILE_USERNAME: Mateusz-CristalCodeai
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/generate_readme_stats.py

      - name: Commit refreshed SVG assets
        run: |
          if git diff --quiet -- assets/profile-github-stats.svg assets/profile-top-languages.svg; then
            echo "No SVG changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-github-stats.svg assets/profile-top-languages.svg
          git commit -m "chore(readme): refresh generated profile stats"
          git push
